<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Portal educativo</title>
  <style>
    :root {
      color-scheme: light;
      --fondo: #f4f7fb;
      --panel: #ffffff;
      --texto: #243447;
      --suave: #5f6f82;
      --borde: #dce5ef;
      --acento: #315f85;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--fondo);
      color: var(--texto);
      font-family: Arial, Helvetica, sans-serif;
    }
    main {
      width: min(680px, 100%);
      padding: 36px;
      border: 1px solid var(--borde);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 12px 34px rgba(36, 52, 71, .10);
      text-align: center;
    }
    h1 { margin: 0 0 12px; color: var(--acento); font-size: clamp(26px, 5vw, 38px); }
    p { margin: 8px 0; color: var(--suave); line-height: 1.6; }
    .estado {
      margin-top: 24px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #edf5fb;
      color: var(--acento);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Portal educativo</h1>
    <p>Espacio de acceso a las actividades digitales de la escuela.</p>
    <p>La nueva interfaz con acceso autorizado se encuentra en preparación.</p>
    <div class="estado">No hay actividades publicadas en este momento.</div>
  </main>
</body>
</html>
